rules:
  - id: leetcode-missing-link-first-line
    pattern-regex: "\\A(?!# link: https?://)[^\\n]+"
    languages: [generic]
    paths:
      include:
        - "leetcode/"
    message: "First line of file must be '# link: https://leetcode.com/problems/...'"
    severity: ERROR

  - id: leetcode-missing-blank-after-link
    pattern-regex: "\\A# link: [^\\n]+\\n(?!\\n)"
    languages: [generic]
    paths:
      include:
        - "leetcode/"
    message: "Second line must be blank (empty line after '# link: ...')"
    severity: ERROR

  - id: leetcode-missing-complexity-comment
    pattern-regex: "\\A(?!(?s).*# O\\([^)]*\\)[^\n]*time[^\n]*space)."
    languages: [generic]
    paths:
      include:
        - "leetcode/"
    message: "File must contain exactly one complexity comment (e.g. # O(n) time and O(1) space)"
    severity: ERROR

  - id: leetcode-complexity-not-in-method
    pattern-regex: "^# O\\([^)]*\\)[^\n]*time[^\n]*space"
    languages: [generic]
    paths:
      include:
        - "leetcode/"
    message: "Complexity comment must be inside a method (indented after def), not at file level"
    severity: ERROR

  - id: leetcode-complexity-wrong-order
    pattern-regex: "# O\\([^)]*\\)[^\n]*space[^\n]*time"
    languages: [generic]
    paths:
      include:
        - "leetcode/"
    message: "Complexity comment must use 'time' before 'space' (e.g. # O(n) time and O(1) space)"
    severity: ERROR
